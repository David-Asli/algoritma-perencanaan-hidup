<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <!-- Emerald glow -->
    <radialGradient id="emeraldGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold gradient for crescent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <!-- Emerald gradient for path -->
    <linearGradient id="emeraldGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <!-- Circuit glow filter -->
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowEmerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="245"/>
    </clipPath>
  </defs>

  <!-- Dark navy circular badge background -->
  <circle cx="256" cy="256" r="256" fill="#0F172A"/>
  <circle cx="256" cy="256" r="245" fill="url(#bgGrad)"/>

  <!-- Subtle emerald ambient glow -->
  <circle cx="256" cy="256" r="245" fill="url(#emeraldGlow)"/>

  <!-- Outer ring border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#10B981" stroke-width="2" stroke-opacity="0.35"/>
  <circle cx="256" cy="256" r="235" fill="none" stroke="#FBBF24" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- CIRCUIT BOARD LINES (background layer) -->
  <!-- ═══════════════════════════════════════ -->
  <g clip-path="url(#circleClip)" opacity="0.55">
    <!-- Horizontal circuit traces -->
    <line x1="60" y1="310" x2="145" y2="310" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="367" y1="310" x2="452" y2="310" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="60" y1="340" x2="120" y2="340" stroke="#10B981" stroke-width="1" stroke-opacity="0.25"/>
    <line x1="392" y1="340" x2="452" y2="340" stroke="#10B981" stroke-width="1" stroke-opacity="0.25"/>

    <!-- Vertical circuit traces -->
    <line x1="145" y1="290" x2="145" y2="330" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="367" y1="290" x2="367" y2="330" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>

    <!-- Circuit nodes / pads -->
    <circle cx="145" cy="310" r="4" fill="#10B981" opacity="0.5"/>
    <circle cx="367" cy="310" r="4" fill="#10B981" opacity="0.5"/>
    <circle cx="120" cy="340" r="3" fill="#10B981" opacity="0.3"/>
    <circle cx="392" cy="340" r="3" fill="#10B981" opacity="0.3"/>

    <!-- Bottom circuit cluster left -->
    <line x1="80" y1="380" x2="160" y2="380" stroke="#10B981" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="160" y1="360" x2="160" y2="395" stroke="#10B981" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="160" cy="380" r="3" fill="#10B981" opacity="0.4"/>
    <circle cx="80" cy="380" r="2.5" fill="#10B981" opacity="0.3"/>

    <!-- Bottom circuit cluster right -->
    <line x1="352" y1="380" x2="432" y2="380" stroke="#10B981" stroke-width="1" stroke-opacity="0.3"/>
    <line x1="352" y1="360" x2="352" y2="395" stroke="#10B981" stroke-width="1" stroke-opacity="0.3"/>
    <circle cx="352" cy="380" r="3" fill="#10B981" opacity="0.4"/>
    <circle cx="432" cy="380" r="2.5" fill="#10B981" opacity="0.3"/>

    <!-- Top small circuit traces -->
    <line x1="100" y1="160" x2="140" y2="160" stroke="#FBBF24" stroke-width="1" stroke-opacity="0.2"/>
    <line x1="372" y1="160" x2="412" y2="160" stroke="#FBBF24" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="140" cy="160" r="2.5" fill="#FBBF24" opacity="0.25"/>
    <circle cx="372" cy="160" r="2.5" fill="#FBBF24" opacity="0.25"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- CRESCENT MOON (Gold, top center)       -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#glowGold)" transform="translate(256, 148)">
    <!-- Outer moon arc -->
    <path d="M 0,-78
             A 78,78 0 1,1 55.15,55.15
             A 55,55 0 1,0 0,-78 Z"
          fill="url(#goldGrad)"
          transform="rotate(-30)"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- LETTER "A" — Integrated Geometric      -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Bold "A" using triangular strokes, centered, emerald+gold -->
  <g transform="translate(256, 256)" filter="url(#glowEmerald)">
    <!-- Left stroke of A -->
    <polygon points="0,-95  -52,55  -30,55  0,-38" fill="url(#emeraldGrad)"/>
    <!-- Right stroke of A -->
    <polygon points="0,-95   52,55   30,55   0,-38" fill="url(#emeraldGrad)"/>
    <!-- Crossbar of A -->
    <rect x="-30" y="5" width="60" height="14" rx="4" fill="#FBBF24"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- ROADMAP / PATH (upward arrow + nodes)  -->
  <!-- ═══════════════════════════════════════ -->
  <g filter="url(#glowEmerald)">
    <!-- Rising path line -->
    <polyline points="256,420  256,355  256,355"
              fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>

    <!-- Step nodes on path -->
    <circle cx="256" cy="420" r="7"  fill="#10B981" opacity="0.9"/>
    <circle cx="256" cy="390" r="5.5" fill="#10B981" opacity="0.75"/>
    <circle cx="256" cy="365" r="4.5" fill="#34D399" opacity="0.65"/>

    <!-- Upward chevron arrow tip -->
    <polyline points="238,360  256,340  274,360"
              fill="none" stroke="#FBBF24" stroke-width="4.5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- AI CHIP ELEMENT (center diamond nodes) -->
  <!-- ═══════════════════════════════════════ -->
  <g opacity="0.7" clip-path="url(#circleClip)">
    <!-- Small chip rectangle bottom -->
    <rect x="230" y="432" width="52" height="28" rx="6"
          fill="none" stroke="#10B981" stroke-width="1.8" stroke-opacity="0.5"/>
    <!-- Chip pins -->
    <line x1="240" y1="432" x2="240" y2="420" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="256" y1="432" x2="256" y2="420" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="272" y1="432" x2="272" y2="420" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="240" y1="460" x2="240" y2="470" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="256" y1="460" x2="256" y2="470" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="272" y1="460" x2="272" y2="470" stroke="#10B981" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- STAR / SPARKLE accents (Islamic touch) -->
  <!-- ═══════════════════════════════════════ -->
  <!-- Small 4-pointed star left -->
  <g transform="translate(178, 188)" opacity="0.75">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z"
          fill="#FBBF24"/>
  </g>
  <!-- Small 4-pointed star right -->
  <g transform="translate(334, 188)" opacity="0.75">
    <path d="M0,-9 L2,-2 L9,0 L2,2 L0,9 L-2,2 L-9,0 L-2,-2 Z"
          fill="#FBBF24"/>
  </g>
  <!-- Tiny dot accents -->
  <circle cx="196" cy="214" r="2.5" fill="#FBBF24" opacity="0.45"/>
  <circle cx="316" cy="214" r="2.5" fill="#FBBF24" opacity="0.45"/>

</svg>
