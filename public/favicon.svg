<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="em" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0F172A"/>
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Border ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Crescent moon -->
  <g transform="translate(32, 17)">
    <path d="M0,-10 A10,10 0 1,1 7.07,7.07 A7,7 0 1,0 0,-10 Z"
          fill="url(#gold)" transform="rotate(-30)"/>
  </g>

  <!-- Letter A — geometric -->
  <g transform="translate(32, 35)">
    <polygon points="0,-13  -7,8  -4,8  0,-5"  fill="url(#em)"/>
    <polygon points="0,-13   7,8   4,8   0,-5"  fill="url(#em)"/>
    <rect x="-4" y="-0.5" width="8" height="2.5" rx="0.8" fill="#FBBF24"/>
  </g>

  <!-- Upward arrow path -->
  <g>
    <circle cx="32" cy="54" r="2" fill="#10B981" opacity="0.9"/>
    <circle cx="32" cy="49" r="1.5" fill="#10B981" opacity="0.7"/>
    <polyline points="27,46  32,41  37,46"
              fill="none" stroke="#FBBF24" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Star accents -->
  <path d="M21,22 L21.8,24.2 L24,22 L21.8,22.8 Z" fill="#FBBF24" opacity="0.7"/>
  <path d="M43,22 L43.8,24.2 L46,22 L43.8,22.8 Z" fill="#FBBF24" opacity="0.7"/>

  <!-- Subtle circuit dots -->
  <circle cx="10" cy="38" r="1.2" fill="#10B981" opacity="0.4"/>
  <circle cx="54" cy="38" r="1.2" fill="#10B981" opacity="0.4"/>
  <line x1="10" y1="38" x2="16" y2="38" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.3"/>
  <line x1="48" y1="38" x2="54" y2="38" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.3"/>
</svg>
